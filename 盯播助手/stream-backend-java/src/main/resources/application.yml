# 应用基本信息
spring:
  application:
    name: stream-monitor-backend
  profiles:
    active: @spring.profiles.active@

  # 数据源配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/stream_monitor?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
      connection-test-query: SELECT 1

  # Redis配置
  redis:
    host: localhost
    port: 6379
    password:
    database: 0
    timeout: 10000ms
    lettuce:
      pool:
        min-idle: 0
        max-idle: 8
        max-active: 8
        max-wait: -1ms

  # RabbitMQ配置
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /
    listener:
      simple:
        acknowledge-mode: manual
        concurrency: 1
        max-concurrency: 10
        retry:
          enabled: true
          initial-interval: 1000
          max-interval: 10000
          multiplier: 2

  # MongoDB配置
  data:
    mongodb:
      host: localhost
      port: 27017
      database: stream_monitor
      username: mongo_admin
      password: mongo_password
      authentication-database: admin
      grid-fs-database: stream_monitor

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: status
      logic-delete-value: 0
      logic-not-delete-value: 1
  mapper-locations: classpath:mapper/*.xml

# 服务器配置
server:
  port: 8080
  servlet:
    context-path: /api
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

# 日志配置
logging:
  level:
    com.streammonitor: debug
    org.springframework.web: info
    org.springframework.security: info
    com.baomidou.mybatisplus: debug
  file:
    name: logs/stream-monitor.log
    max-size: 100MB
    max-history: 30

# 应用自定义配置
app:
  config:
    jwt:
      secret: streamMonitorSecretKey2024ChangeThisInProduction
      expiration: 86400000 # 24小时
      refresh-expiration: 604800000 # 7天

    wechat:
      app-id: your-app-id
      app-secret: your-app-secret
      template-ids:
        live-start: your-live-start-template-id
        product-launch: your-product-launch-template-id
        keyword-match: your-keyword-match-template-id

    ai:
      api-base-url: https://api.deepseek.com
      api-key: your-ai-api-key
      model-name: deepseek-chat
      timeout: 30000

    crawler:
      interval: 30
      barrage-buffer-size: 50
      max-concurrent-tasks: 1000

    notification:
      rate-limit: 10 # 每分钟最多发送通知数
      retry-count: 3
      retry-interval: 5000

# 跨域配置
cors:
  allowed-origins: "*"
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600