# Prometheus配置文件

global:
  # 全局抓取间隔
  scrape_interval: 15s
  # 全局抓取超时时间
  scrape_timeout: 10s
  # 全局评估间隔
  evaluation_interval: 15s

# Alertmanager配置
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# 规则文件配置
rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

# 抓取配置
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Spring Boot后端监控
  - job_name: 'stream-backend'
    metrics_path: '/api/actuator/prometheus'
    static_configs:
      - targets: ['backend:8080']
    scrape_interval: 15s
    scrape_timeout: 10s

  # Python服务监控
  - job_name: 'stream-python'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['python-service:5000']
    scrape_interval: 15s
    scrape_timeout: 10s

  # MySQL监控（需要额外的exporter）
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
    scrape_interval: 15s

  # Redis监控（需要额外的exporter）
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 15s

  # RabbitMQ监控
  - job_name: 'rabbitmq'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['rabbitmq:15672']
    scrape_interval: 15s

  # Node Exporter（主机监控）
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s