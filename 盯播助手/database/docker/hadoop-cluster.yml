# ============================================
# Hadoop大数据集群Docker配置
# 用于部署HDFS、Hive、Spark、Airflow等组件
# ============================================

version: '3.8'

services:
  # ============================================
  # Hadoop HDFS 集群
  # ============================================

  # NameNode - HDFS主节点
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: stream_namenode
    restart: always
    ports:
      - "9870:9870"  # HDFS Web UI
      - "9000:9000"  # HDFS服务端口
    environment:
      - CLUSTER_NAME=stream-analysis-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_replication=2
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./hadoop-config:/hadoop/etc/hadoop
    networks:
      - bigdata_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DataNode 1
  datanode1:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: stream_datanode1
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
    volumes:
      - datanode1_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - bigdata_network

  # DataNode 2
  datanode2:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: stream_datanode2
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
    volumes:
      - datanode2_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - bigdata_network

  # DataNode 3
  datanode3:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: stream_datanode3
    restart: always
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
    volumes:
      - datanode3_data:/hadoop/dfs/data
    depends_on:
      - namenode
    networks:
      - bigdata_network

  # ============================================
  # Hive 数据仓库
  # ============================================

  # Hive Metastore (MySQL)
  hive-metastore:
    image: mysql:8.0
    container_name: stream_hive_metastore
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=hive_root_password
      - MYSQL_DATABASE=hive_metastore
      - MYSQL_USER=hive_user
      - MYSQL_PASSWORD=hive_password
    ports:
      - "3307:3306"
    volumes:
      - hive_metastore_data:/var/lib/mysql
      - ./hive-init:/docker-entrypoint-initdb.d
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    networks:
      - bigdata_network

  # Hive Metastore Server
  hive-metastore-server:
    image: bde2020/hive:2.3.9
    container_name: stream_hive_metastore_server
    restart: always
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=mysql
      - DB_USER=hive_user
      - DB_PASS=hive_password
      - DB_URL=jdbc:mysql://hive-metastore:3306/hive_metastore?createDatabaseIfNotExist=true
    depends_on:
      - hive-metastore
      - namenode
    ports:
      - "9083:9083"
    networks:
      - bigdata_network

  # Hive Server2
  hive-server:
    image: bde2020/hive:2.3.9
    container_name: stream_hive_server
    restart: always
    environment:
      - SERVICE_NAME=hiveserver2
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionURL=jdbc:mysql://hive-metastore:3306/hive_metastore?createDatabaseIfNotExist=true
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionDriverName=com.mysql.cj.jdbc.Driver
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionUserName=hive_user
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionPassword=hive_password
    depends_on:
      - hive-metastore-server
      - namenode
    ports:
      - "10000:10000"  # HiveServer2
      - "10002:10002"  # Hive Web UI
    networks:
      - bigdata_network

  # Hive Web Interface (HWI)
  hive-webhcat:
    image: bde2020/hive:2.3.9
    container_name: stream_hive_webhcat
    restart: always
    environment:
      - SERVICE_NAME=webhcat_server
    depends_on:
      - hive-server
    ports:
      - "50111:50111"
    networks:
      - bigdata_network

  # ============================================
  # Spark 计算引擎
  # ============================================

  # Spark Master
  spark-master:
    image: bde2020/spark-master:3.0.0-hadoop3.2
    container_name: stream_spark_master
    restart: always
    ports:
      - "8080:8080"  # Spark Master Web UI
      - "7077:7077"  # Spark Master Port
    environment:
      - INIT_DAEMON_STEP=setup_spark
      - SPARK_MASTER_HOST=spark-master
    networks:
      - bigdata_network

  # Spark Worker 1
  spark-worker1:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: stream_spark_worker1
    restart: always
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8081:8081"  # Spark Worker Web UI
    depends_on:
      - spark-master
    networks:
      - bigdata_network

  # Spark Worker 2
  spark-worker2:
    image: bde2020/spark-worker:3.0.0-hadoop3.2
    container_name: stream_spark_worker2
    restart: always
    environment:
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8082:8081"  # Spark Worker Web UI
    depends_on:
      - spark-master
    networks:
      - bigdata_network

  # Spark History Server
  spark-history-server:
    image: bde2020/spark-history-server:3.0.0-hadoop3.2
    container_name: stream_spark_history
    restart: always
    ports:
      - "18080:18080"
    environment:
      - SPARK_HISTORY_OPTS=-Dspark.history.fs.logDirectory=hdfs://namenode:9000/spark-logs
    depends_on:
      - namenode
      - spark-master
    networks:
      - bigdata_network

  # ============================================
  # ZooKeeper 协调服务
  # ============================================

  zookeeper:
    image: zookeeper:3.8
    container_name: stream_zookeeper
    restart: always
    ports:
      - "2181:2181"
    environment:
      - ZOO_MY_ID=1
      - ZOO_SERVERS=server.1=zookeeper:2888:3888;2181
    volumes:
      - zookeeper_data:/data
      - zookeeper_datalog:/datalog
    networks:
      - bigdata_network

  # ============================================
  # Apache Airflow 任务调度
  # ============================================

  # Airflow PostgreSQL
  airflow-postgres:
    image: postgres:13
    container_name: stream_airflow_postgres
    restart: always
    environment:
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
    ports:
      - "5433:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data
    networks:
      - bigdata_network

  # Airflow Redis (用于Celery Executor)
  airflow-redis:
    image: redis:7.0-alpine
    container_name: stream_airflow_redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - airflow_redis_data:/data
    networks:
      - bigdata_network

  # Airflow Webserver
  airflow-webserver:
    image: apache/airflow:2.7.2
    container_name: stream_airflow_webserver
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=True
      - AIRFLOW_CONN_HIVE_DEFAULT=hive://hive-server:10000/default
    env_file:
      - airflow.env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      - airflow-postgres
      - airflow-redis
    ports:
      - "8083:8080"
    networks:
      - bigdata_network

  # Airflow Scheduler
  airflow-scheduler:
    image: apache/airflow:2.7.2
    container_name: stream_airflow_scheduler
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    env_file:
      - airflow.env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      - airflow-postgres
      - airflow-redis
    networks:
      - bigdata_network

  # Airflow Worker
  airflow-worker:
    image: apache/airflow:2.7.2
    container_name: stream_airflow_worker
    restart: always
    environment:
      - AIRFLOW__CORE__EXECUTOR=CeleryExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://airflow:airflow@airflow-postgres:5432/airflow
      - AIRFLOW__CELERY__BROKER_URL=redis://airflow-redis:6379/0
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
    env_file:
      - airflow.env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
    depends_on:
      - airflow-postgres
      - airflow-redis
      - airflow-scheduler
    networks:
      - bigdata_network

  # ============================================
  # 数据迁移服务
  # ============================================

  data-migration-service:
    build:
      context: ../scripts
      dockerfile: Dockerfile.data-migration
    container_name: stream_data_migration
    restart: always
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_PORT=27017
      - MONGODB_DATABASE=stream_monitor
      - MONGODB_USERNAME=mongo_admin
      - MONGODB_PASSWORD=mongo_password
      - HDFS_HOST=namenode
      - HDFS_PORT=9000
      - HDFS_USER=hadoop
    depends_on:
      - namenode
      - hive-server
    volumes:
      - ../scripts:/app
      - migration_logs:/app/logs
    networks:
      - bigdata_network
      - stream_monitor_network

  # ============================================
  # 监控和可视化
  # ============================================

  # Apache Superset (BI工具)
  superset:
    image: apache/superset:2.1.0
    container_name: stream_superset
    restart: always
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your-secret-key-here
      - DATABASE_HOST=airflow-postgres
      - DATABASE_PORT=5432
      - DATABASE_DB=superset
      - DATABASE_USER=airflow
      - DATABASE_PASSWORD=airflow
      - DATABASE_ENGINE=postgresql
    depends_on:
      - airflow-postgres
    volumes:
      - superset_data:/var/lib/superset
    networks:
      - bigdata_network

volumes:
  # HDFS存储
  namenode_data:
  datanode1_data:
  datanode2_data:
  datanode3_data:

  # Hive元数据存储
  hive_metastore_data:

  # ZooKeeper数据
  zookeeper_data:
  zookeeper_datalog:

  # Airflow数据
  airflow_postgres_data:
  airflow_redis_data:

  # 数据迁移日志
  migration_logs:

  # Superset数据
  superset_data:

networks:
  bigdata_network:
    driver: bridge
  stream_monitor_network:
    external: true
    name: stream_monitor_network

# ============================================
# 使用说明
# ============================================
#
# 1. 启动集群:
#    docker-compose -f hadoop-cluster.yml up -d
#
# 2. 访问各组件Web界面:
#    - HDFS NameNode: http://localhost:9870
#    - Hive Web UI: http://localhost:10002
#    - Spark Master: http://localhost:8080
#    - Spark Worker 1: http://localhost:8081
#    - Spark Worker 2: http://localhost:8082
#    - Spark History: http://localhost:18080
#    - Airflow Webserver: http://localhost:8083
#    - Superset: http://localhost:8088
#
# 3. 连接到Hive:
#    beeline -u jdbc:hive2://localhost:10000
#
# 4. 停止集群:
#    docker-compose -f hadoop-cluster.yml down
#
# 5. 清理数据:
#    docker-compose -f hadoop-cluster.yml down -v
#
# ============================================