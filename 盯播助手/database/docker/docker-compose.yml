version: '3.8'

services:
  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: stream_monitor_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: stream_monitor
      MYSQL_USER: stream_user
      MYSQL_PASSWORD: stream_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    networks:
      - stream_monitor_network

  # Redis缓存
  redis:
    image: redis:7.0-alpine
    container_name: stream_monitor_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass redis_password
    networks:
      - stream_monitor_network

  # MongoDB文档数据库（用于弹幕数据存储）
  mongodb:
    image: mongo:6.0
    container_name: stream_monitor_mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
      MONGO_INITDB_DATABASE: stream_monitor
    volumes:
      - mongodb_data:/data/db
      - ../database/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: ["--auth", "--wiredTigerCacheSizeGB=1"]
    networks:
      - stream_monitor_network

  # RabbitMQ消息队列
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: stream_monitor_rabbitmq
    restart: always
    ports:
      - "5672:5672"   # AMQP协议端口
      - "15672:15672" # 管理界面端口
    environment:
      RABBITMQ_DEFAULT_USER: stream_user
      RABBITMQ_DEFAULT_PASS: stream_password
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - stream_monitor_network

  # Spring Boot后端服务
  backend:
    build:
      context: ../stream-backend-java
      dockerfile: Dockerfile
    container_name: stream_monitor_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: stream_monitor
      DB_USERNAME: stream_user
      DB_PASSWORD: stream_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: stream_user
      RABBITMQ_PASSWORD: stream_password
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: stream_monitor
      MONGODB_USERNAME: mongo_admin
      MONGODB_PASSWORD: mongo_password
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
      AI_API_KEY: ${AI_API_KEY}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - mongodb
    volumes:
      - backend_logs:/app/logs
    networks:
      - stream_monitor_network

  # Python爬虫和AI服务
  python-service:
    build:
      context: ../stream-spider-python
      dockerfile: Dockerfile
    container_name: stream_monitor_python
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: stream_monitor
      DB_USERNAME: stream_user
      DB_PASSWORD: stream_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: stream_user
      RABBITMQ_PASSWORD: stream_password
      MONGODB_HOST: mongodb
      MONGODB_PORT: 27017
      MONGODB_DATABASE: stream_monitor
      MONGODB_USERNAME: mongo_admin
      MONGODB_PASSWORD: mongo_password
      AI_API_BASE_URL: ${AI_API_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      WECHAT_APP_ID: ${WECHAT_APP_ID}
      WECHAT_APP_SECRET: ${WECHAT_APP_SECRET}
    depends_on:
      - mysql
      - redis
      - rabbitmq
      - mongodb
    volumes:
      - python_logs:/app/logs
    networks:
      - stream_monitor_network

  # Nginx反向代理（可选）
  nginx:
    image: nginx:1.25-alpine
    container_name: stream_monitor_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backend
      - python-service
    networks:
      - stream_monitor_network

  # 监控和日志收集（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: stream_monitor_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - backend
      - python-service
    networks:
      - stream_monitor_network

  grafana:
    image: grafana/grafana:latest
    container_name: stream_monitor_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin123
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - stream_monitor_network

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  mongodb_data:
  backend_logs:
  python_logs:
  prometheus_data:
  grafana_data:

networks:
  stream_monitor_network:
    driver: bridge