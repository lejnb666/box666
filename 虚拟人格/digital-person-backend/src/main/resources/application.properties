server.port=8080
spring.application.name=digital-person-backend

# CORS configuration
cors.allowed-origins=*

# LLM Configuration
llm.api.key=your-deepseek-api-key-here
llm.api.url=https://api.deepseek.com/v1/chat/completions
llm.model=deepseek-chat
temperature=0.7
max.tokens=1000

# Database Configuration (for future use)
# spring.datasource.url=jdbc:mysql://localhost:3306/digital_person
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.hibernate.ddl-auto=update

# Redis Configuration (for future use)
# spring.redis.host=localhost
# spring.redis.port=6379

# Logging configuration
logging.level.com.digitalperson=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.reactive=DEBUG