server.port=8080
spring.application.name=digital-person-backend

# CORS configuration
cors.allowed-origins=*

# LLM Configuration
llm.api.key=your-deepseek-api-key-here
llm.api.url=https://api.deepseek.com/v1/chat/completions
llm.model=deepseek-chat
temperature=0.7
max.tokens=1000

# Python Services Configuration
python.rag.url=http://localhost:5000
python.agent.url=http://localhost:5002

# CORS Configuration
cors.allowed-origins=*

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/digital_person?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Redis Configuration
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.timeout=2000ms

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGeneration123!@#
jwt.expiration=86400

# Logging configuration
logging.level.com.digitalperson=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.web.reactive=DEBUG